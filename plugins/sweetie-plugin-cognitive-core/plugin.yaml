name: sweetie-plugin-cognitive-core
version: 1.0.0
api_version: 1
display_name: Sweetie Cognitive Core
description: Event interpretation, attention scoring, goal selection, and action suggestion layer for CERBERUS-compatible Sweetie systems.
capabilities:
  - cognition.perceive_event
  - cognition.evaluate_context
  - cognition.choose_action
  - cognition.set_state
  - cognition.get_state
  - cognition.reset
  - cognition.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
