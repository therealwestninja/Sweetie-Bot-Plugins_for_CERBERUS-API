name: Implementation slice
description: Track a focused, GitHub-ready chunk of work.
title: "slice: "
labels: ["type: task", "good first issue", "triage"]
body:
  - type: input
    id: outcome
    attributes:
      label: Outcome
      placeholder: What will exist when this is done?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: In scope
      placeholder: |
        - file or module
        - UI or API surface
        - docs or tests
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: |
        - [ ] code or docs merged
        - [ ] tests updated
        - [ ] changelog / roadmap updated if needed
    validations:
      required: true
