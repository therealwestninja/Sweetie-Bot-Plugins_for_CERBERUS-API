name: Bug report
description: Report a reproducible defect in code, docs, tooling, or assets.
title: "bug: "
labels: ["type: bug", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - upstream-api
        - upstream-web
        - sweetiebot runtime
        - plugins
        - assets
        - ops
        - docs
        - tooling
    validations:
      required: true
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-sentence description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or relevant asset IDs
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This issue may affect robot motion, safety interlocks, or public-demo operation.
