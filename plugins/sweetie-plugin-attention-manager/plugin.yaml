name: sweetie-plugin-attention-manager
version: 2.0.0
api_version: 1
display_name: Sweetie Attention Manager
description: Updated multi-target attention scoring with social-bonding and autonomy-aware prioritization.
capabilities:
  - attention.ingest_candidates
  - attention.rank
  - attention.select_focus
  - attention.set_bias
  - attention.get_focus
  - attention.reset
  - attention.status
entrypoints:
  execute: /execute
healthcheck: /health
port: 7000
