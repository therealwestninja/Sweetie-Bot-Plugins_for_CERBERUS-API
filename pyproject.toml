[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sweetiebot-fork"
version = "0.0.9"
description = "Aspirational monorepo scaffold for a character robot fork"
requires-python = ">=3.11"
dependencies = ["PyYAML>=6.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
