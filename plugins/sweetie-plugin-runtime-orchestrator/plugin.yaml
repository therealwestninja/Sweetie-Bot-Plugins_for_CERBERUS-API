name: sweetie-plugin-runtime-orchestrator
version: 1.0.0
api_version: 1
display_name: Sweetie Runtime Orchestrator Plugin
description: Cross-plugin chaining and orchestration layer for CERBERUS-compatible Sweetie plugins.
capabilities:
  - runtime.register_routes
  - runtime.chain_execute
  - runtime.follow_object
  - runtime.patrol_mission
  - runtime.simulate_chain
  - runtime.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
compatibility:
  controller: CERBERUS-UnitreeGo2Companion_Web-Interface
  backend: CERBERUS-UnitreeGo2CompanionAPI
