name: sweetie-plugin-navigation-core
version: 1.0.0
api_version: 1
display_name: Sweetie Navigation Core
description: Goal-directed navigation planning and route generation for CERBERUS-compatible Sweetie systems.
capabilities:
  - navigation.set_position
  - navigation.plan_to_point
  - navigation.plan_to_location
  - navigation.follow_route
  - navigation.cancel_route
  - navigation.get_route
  - navigation.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
