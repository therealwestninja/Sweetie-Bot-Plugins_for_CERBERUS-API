name: sweetie-plugin-behavior-engine
version: 1.0.0
api_version: 1
display_name: Sweetie Behavior Engine
description: Personality-driven behavior shaping, tone selection, and action styling for CERBERUS-compatible Sweetie systems.
capabilities:
  - behavior.process_intent
  - behavior.generate_style
  - behavior.set_persona_state
  - behavior.get_persona_state
  - behavior.reset
  - behavior.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
