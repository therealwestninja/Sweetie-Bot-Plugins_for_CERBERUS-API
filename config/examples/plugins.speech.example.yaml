plugins:
  sweetiebot.mock_tts:
    enabled: true
    default_voice: sweetie
    cache_dir: .cache/tts
    max_chars: 160
    speaking_rate: 1.0
    pitch: 0.0

  sweetiebot.mock_audio_output:
    enabled: true
    device_name: default
    playback_mode: immediate
    allow_file_export: true
    volume: 0.85
