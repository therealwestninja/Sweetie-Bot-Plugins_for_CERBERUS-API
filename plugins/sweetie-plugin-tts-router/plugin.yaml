name: sweetie-plugin-tts-router
version: 1.0.0
api_version: 1
display_name: Sweetie TTS Router
description: Voice routing, style shaping, and speech synthesis request normalization for CERBERUS-compatible Sweetie systems.
capabilities:
  - tts.speak
  - tts.preview_voice
  - tts.list_voices
  - tts.set_defaults
  - tts.get_defaults
  - tts.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
