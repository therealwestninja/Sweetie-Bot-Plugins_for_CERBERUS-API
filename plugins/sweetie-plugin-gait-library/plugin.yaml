name: sweetie-plugin-gait-library
version: 1.0.0
api_version: 1
display_name: Sweetie Gait Library Plugin
description: Reusable gait profile and movement-style adapter for CERBERUS-compatible quadruped control.
capabilities:
  - gait.list_profiles
  - gait.list_gaits
  - gait.get_gait
  - gait.set_active
  - gait.get_active
  - gait.adapt_command
  - gait.preview_sequence
  - gait.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
compatibility:
  controller: CERBERUS-UnitreeGo2Companion_Web-Interface
  backend: CERBERUS-UnitreeGo2CompanionAPI
