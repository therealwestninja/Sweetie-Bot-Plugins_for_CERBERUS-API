[pytest]
addopts = -ra
pythonpath = .
testpaths = tests
markers =
    smoke: Fast API contract and endpoint smoke coverage.
    contract: Manifest, endpoint, capability, and schema contract checks.
    security: Negative, fuzz, and abuse-case tests.
    concurrency: Multi-request and race-condition checks.
    performance: Latency and throughput guardrails.
    slow: Long-running deep fuzz and soak tests.
