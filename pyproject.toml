[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sweetiebot-fork"
version = "0.0.8"
description = "Aspirational monorepo scaffold for a character robot fork"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "httpx>=0.28",
  "uvicorn>=0.30",
  "pydantic>=2.7",
  "PyYAML>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.11.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.setuptools]
packages = ["sweetiebot", "upstream_api", "plugins"]

[tool.setuptools.package-data]
sweetiebot = ["../sweetiebot-assets/**/*.yaml", "../sweetiebot-assets/**/*.json", "../sweetiebot-assets/**/*.md"]
