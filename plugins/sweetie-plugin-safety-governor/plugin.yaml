name: sweetie-plugin-safety-governor
version: 1.0.0
api_version: 1
display_name: Sweetie Safety Governor
description: Safety policy, action constraint, and approval layer for CERBERUS-compatible Sweetie systems.
capabilities:
  - safety.evaluate_action
  - safety.set_policy
  - safety.get_policy
  - safety.report_context
  - safety.estop
  - safety.clear_estop
  - safety.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
