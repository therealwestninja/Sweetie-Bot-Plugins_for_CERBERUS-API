name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest

  web-placeholder:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: upstream-web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install placeholder dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
