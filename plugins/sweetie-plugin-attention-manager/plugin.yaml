name: sweetie-plugin-attention-manager
version: 1.0.0
api_version: 1
display_name: Sweetie Attention Manager
description: Multi-target attention scoring, focus selection, and priority management for CERBERUS-compatible Sweetie systems.
capabilities:
  - attention.ingest_candidates
  - attention.rank
  - attention.select_focus
  - attention.set_bias
  - attention.get_focus
  - attention.reset
  - attention.status
entrypoints:
  execute: /execute
  docs: /docs
healthcheck: /health
port: 7000
