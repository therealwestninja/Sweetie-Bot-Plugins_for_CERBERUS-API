name: sweetie-plugin-event-bus
version: 2.1.0
api_version: 1
display_name: Sweetie Event Bus
description: Updated event bus with event categories and ecosystem-friendly topic routing.
capabilities:
  - event.publish
  - event.subscribe
  - event.unsubscribe
  - event.poll
  - event.recent
  - event.clear
  - event.status
entrypoints:
  execute: /execute
healthcheck: /health
port: 7000
