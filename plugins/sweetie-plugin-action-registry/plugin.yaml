name: sweetie-plugin-action-registry
version: 2.1.0
api_version: 1
display_name: Sweetie Action Registry
description: Updated action registry with newer ecosystem action templates and policy metadata.
capabilities:
  - action.register
  - action.unregister
  - action.list
  - action.get
  - action.dispatch
  - action.set_policy
  - action.seed_defaults
  - action.status
entrypoints:
  execute: /execute
healthcheck: /health
port: 7000
